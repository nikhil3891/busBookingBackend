version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bus-booking-api
    ports:
      - '4001:4001'
    environment:
      - NODE_ENV=development
      - PORT=4001
      - MONGO_URI=mongodb://mongo:27017/busBookingDB
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-super_secret_dev_key_change_in_prod}
      - JWT_EXPIRES_IN=15m
      - REFRESH_EXPIRES_IN=7d
      - BULL_BOARD_PATH=/admin/queues
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - busbooking-net

  mongo:
    image: mongo:7.0
    container_name: bus-booking-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - busbooking-net

  redis:
    image: redis:7.2-alpine
    container_name: bus-booking-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - busbooking-net

  mongo-express:
    image: mongo-express:latest
    container_name: bus-booking-mongo-ui
    ports:
      - '8081:8081'
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=password
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - busbooking-net
    profiles:
      - tools

volumes:
  mongo-data:
  redis-data:

networks:
  busbooking-net:
    driver: bridge
